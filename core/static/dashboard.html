<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvil Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1a1a24; --border: #1e1e2e;
  --text: #e0e0e8; --muted: #6b6b80; --accent: #6c5ce7;
  --green: #00b894; --yellow: #fdcb6e; --red: #e17055; --blue: #74b9ff;
  --orange: #e88a4a;
}
body { font-family: -apple-system, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.header-left { display: flex; align-items: center; gap: 20px; }
.header h1 { font-size: 15px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.tabs { display: flex; gap: 2px; }
.tab { padding: 5px 14px; font-size: 12px; border-radius: 4px; cursor: pointer; color: var(--muted); background: transparent; border: none; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); color: white; }
.conn-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
.conn-dot.connected { background: var(--green); }

/* Views */
.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ==================== OVERVIEW VIEW ==================== */
#overviewView { flex-direction: column; }

.overview-top { flex: 1; display: grid; grid-template-columns: 220px 1fr 240px; overflow: hidden; }

/* Pool cards */
.pools-panel { border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; }
.pools-panel h2, .demands-panel h2, .resources-panel h2, .detail-panel h2, .agent-view-panel h2 { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
.pool-card { padding: 10px; border-radius: 8px; background: var(--surface); margin-bottom: 6px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
.pool-card:hover { border-color: var(--accent); }
.pool-card .pool-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.pool-card .pool-bar { height: 4px; border-radius: 2px; background: var(--border); margin-bottom: 4px; }
.pool-card .pool-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }
.pool-card .pool-meta { font-size: 10px; color: var(--muted); }

/* Demand queue */
.demands-panel { padding: 12px; overflow-y: auto; }
.demand-row { display: grid; grid-template-columns: 32px 1fr 120px 60px; align-items: center; padding: 8px 10px; border-radius: 6px; background: var(--surface); margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
.demand-row:hover { border-color: var(--accent); }
.demand-priority { font-size: 11px; font-weight: 700; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.demand-priority.p0 { background: var(--red); color: white; }
.demand-priority.p1 { background: var(--orange); color: white; }
.demand-priority.p2 { background: var(--yellow); color: #333; }
.demand-priority.p3 { background: var(--border); color: var(--muted); }
.demand-title { font-size: 12px; font-weight: 500; margin-left: 8px; }
.demand-progress { height: 4px; border-radius: 2px; background: var(--border); }
.demand-progress-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s; }
.demand-status { font-size: 10px; color: var(--muted); text-align: right; }

/* Resources */
.resources-panel { border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; }
.resource-card { padding: 8px; border-radius: 6px; background: var(--surface); margin-bottom: 6px; border: 1px solid var(--border); }
.resource-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.resource-status { font-size: 10px; color: var(--muted); }

/* ==================== DEMAND VIEW ==================== */
#demandView { flex-direction: row; }

.graph-panel { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
.graph-panel svg { width: 100%; height: 100%; }
.graph-back { position: absolute; top: 12px; left: 12px; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 11px; z-index: 10; }
.graph-title { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 600; z-index: 10; }

.demand-sidebar { width: 300px; border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; }
.demand-meta { margin-bottom: 12px; }
.demand-meta dt { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 8px; }
.demand-meta dd { font-size: 13px; }

/* Graph nodes */
.node circle { stroke-width: 2px; cursor: pointer; }
.node text { font-size: 10px; fill: var(--text); pointer-events: none; }
.node .agent-label { font-size: 8px; fill: var(--muted); }
.link { stroke: var(--border); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }

/* Node status colors */
.node-planned circle { fill: var(--surface2); stroke: var(--muted); }
.node-in_progress circle { fill: var(--surface2); stroke: var(--yellow); stroke-width: 3px; }
.node-done circle { fill: var(--surface2); stroke: var(--green); }
.node-blocked circle, .node-failed circle { fill: var(--surface2); stroke: var(--red); }

/* ==================== AGENT VIEW ==================== */
#agentView { flex-direction: row; }

.agent-view-panel { flex: 1; padding: 12px; overflow-y: auto; }
.agent-back { display: inline-block; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 11px; margin-bottom: 12px; }
.instance-card { padding: 10px; border-radius: 8px; background: var(--surface); margin-bottom: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.instance-id { font-size: 13px; font-weight: 600; }
.instance-status { font-size: 11px; padding: 2px 8px; border-radius: 3px; }
.instance-status.idle { background: var(--green); color: white; }
.instance-status.busy { background: var(--yellow); color: #333; }
.instance-task { font-size: 11px; color: var(--muted); margin-top: 4px; }
.queue-section { margin-top: 16px; }
.queue-item { padding: 6px 10px; font-size: 11px; color: var(--muted); border-left: 2px solid var(--border); margin-bottom: 2px; }

/* ==================== STATS BAR ==================== */
.stats-bar { display: flex; gap: 20px; padding: 8px 20px; border-top: 1px solid var(--border); background: var(--surface); font-size: 11px; }
.stat { display: flex; align-items: center; gap: 4px; }
.stat .label { color: var(--muted); }
.stat .value { font-weight: 600; }

/* Activity log (reused in demand sidebar) */
.activity-log { margin-top: 12px; max-height: 200px; overflow-y: auto; }
.activity-item { padding: 3px 6px; font-size: 10px; border-left: 2px solid var(--border); margin-bottom: 1px; color: var(--muted); }
.activity-item.tool_call { border-left-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span>Anvil</span> Dashboard</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchView('overview')">Overview</button>
      <button class="tab" onclick="switchView('demand')">Demand</button>
      <button class="tab" onclick="switchView('agent')">Agent</button>
    </div>
  </div>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">connecting...</span>
  </div>
</div>

<!-- ==================== OVERVIEW VIEW ==================== -->
<div class="view active" id="overviewView">
  <div class="overview-top">
    <div class="pools-panel">
      <h2>Agent Pools</h2>
      <div id="poolsList"></div>
    </div>
    <div class="demands-panel">
      <h2>Demand Queue</h2>
      <div id="demandsList"></div>
    </div>
    <div class="resources-panel">
      <h2>Resources</h2>
      <div id="resourcesList"></div>
      <h2 style="margin-top:16px">Active Tasks</h2>
      <div id="activeTasks" style="font-size:11px;color:var(--muted)">-</div>
    </div>
  </div>
</div>

<!-- ==================== DEMAND VIEW ==================== -->
<div class="view" id="demandView">
  <div class="graph-panel">
    <button class="graph-back" onclick="switchView('overview')">← Back</button>
    <div class="graph-title" id="graphTitle"></div>
    <svg id="graphSvg"></svg>
  </div>
  <div class="demand-sidebar" id="demandSidebar">
    <h2>Demand Detail</h2>
    <div id="demandDetail"></div>
    <div class="activity-log">
      <h2>Activity</h2>
      <div id="demandActivity"></div>
    </div>
  </div>
</div>

<!-- ==================== AGENT VIEW ==================== -->
<div class="view" id="agentView">
  <div class="agent-view-panel">
    <button class="agent-back" onclick="switchView('overview')">← Back</button>
    <h2 id="agentViewTitle">Agent Pool</h2>
    <div id="agentInstances"></div>
    <div class="queue-section">
      <h2>Waiting Queue</h2>
      <div id="agentQueue"></div>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="label">Demands:</span> <span class="value" id="statDemands">0</span></div>
  <div class="stat"><span class="label">Tasks:</span> <span class="value" id="statTasks">0</span></div>
  <div class="stat"><span class="label">Tokens:</span> <span class="value" id="statTokens">0</span></div>
  <div class="stat"><span class="label">Cost:</span> <span class="value" id="statCost">$0.00</span></div>
</div>

<script>
let lastEventId = 0;
let currentView = 'overview';
let selectedDemandId = null;
let selectedAgentType = null;

const AGENT_COLORS = {
  art: '#e17055', engineering: '#6c5ce7', qa: '#00b894',
  design: '#fdcb6e', studio: '#74b9ff', 'go-dev': '#a29bfe',
  pm: '#fab1a0', pjm: '#81ecec', cd: '#dfe6e9', marketing: '#ffeaa7'
};

// === View switching ===
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(view + 'View').classList.add('active');
  document.querySelector(`.tab[onclick*="${view}"]`).classList.add('active');
  if (view === 'overview') loadOverview();
  if (view === 'demand' && selectedDemandId) loadDemandGraph(selectedDemandId);
  if (view === 'agent' && selectedAgentType) loadAgentView(selectedAgentType);
}

// === OVERVIEW ===
async function loadOverview() {
  const res = await fetch('/api/v2/overview');
  const data = await res.json();

  // Pools
  const pools = data.pools || {};
  document.getElementById('poolsList').innerHTML = Object.entries(pools).map(([type, p]) => {
    const pct = p.total > 0 ? (p.busy / p.total * 100) : 0;
    const color = AGENT_COLORS[type] || '#6c5ce7';
    return `<div class="pool-card" onclick="openAgentView('${type}')">
      <div class="pool-name" style="color:${color}">${type}</div>
      <div class="pool-bar"><div class="pool-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="pool-meta">${p.busy}/${p.total} busy</div>
    </div>`;
  }).join('');

  // Demands
  const demands = data.demands || [];
  document.getElementById('demandsList').innerHTML = demands.length === 0
    ? '<div style="color:var(--muted);font-size:12px;padding:20px;text-align:center">No active demands</div>'
    : demands.map(d => {
      const prog = d.progress || {};
      const total = prog.total || 0;
      const done = prog.done || 0;
      const pct = total > 0 ? (done / total * 100) : 0;
      const cost = prog.cost || 0;
      return `<div class="demand-row" onclick="openDemandView('${d.id}')">
        <div class="demand-priority p${d.priority}">P${d.priority}</div>
        <div class="demand-title">${esc(d.title)}</div>
        <div><div class="demand-progress"><div class="demand-progress-fill" style="width:${pct}%"></div></div></div>
        <div class="demand-status">${done}/${total}${cost > 0 ? ` $${cost.toFixed(2)}` : ''}</div>
      </div>`;
    }).join('');

  // Resources
  const active = data.resources || [];
  document.getElementById('activeTasks').innerHTML = active.length > 0
    ? active.map(t => `<div style="margin-bottom:2px">${esc(t)}</div>`).join('')
    : '<div style="color:var(--muted)">idle</div>';

  // Stats
  const s = data.stats || {};
  document.getElementById('statDemands').textContent = demands.length;
  document.getElementById('statTasks').textContent = `${s.done || 0}/${s.total_tasks || 0}`;
  const tok = (s.total_input_tokens || 0) + (s.total_output_tokens || 0);
  document.getElementById('statTokens').textContent = tok > 1000 ? `${(tok/1000).toFixed(1)}k` : tok;
  document.getElementById('statCost').textContent = `$${(s.total_cost_usd || 0).toFixed(4)}`;
}

// === DEMAND VIEW with D3 ===
function openDemandView(demandId) {
  selectedDemandId = demandId;
  switchView('demand');
}

async function loadDemandGraph(demandId) {
  const [detailRes, graphRes] = await Promise.all([
    fetch(`/api/v2/demands/${demandId}`),
    fetch(`/api/v2/demands/${demandId}/graph`)
  ]);
  const detail = await detailRes.json();
  const graph = await graphRes.json();

  document.getElementById('graphTitle').textContent = detail.title || demandId;

  // Sidebar
  const tasks = detail.tasks || [];
  const done = tasks.filter(t => t.status === 'done').length;
  const cost = tasks.reduce((s, t) => s + (t.total_cost_usd || 0), 0);
  document.getElementById('demandDetail').innerHTML = `
    <dl class="demand-meta">
      <dt>Priority</dt><dd>P${detail.priority}</dd>
      <dt>Status</dt><dd>${detail.status}</dd>
      <dt>Progress</dt><dd>${done} / ${tasks.length} tasks</dd>
      <dt>Cost</dt><dd>$${cost.toFixed(4)}</dd>
      <dt>Created</dt><dd>${(detail.created_at || '').split('T')[0]}</dd>
    </dl>
    <h2 style="margin-top:12px">Tasks</h2>
    ${tasks.map(t => `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="color:${AGENT_COLORS[t.agent] || '#999'}">${t.agent}</span>
      <strong>${t.id}</strong>
      <span style="color:${{done:'var(--green)',in_progress:'var(--yellow)',blocked:'var(--red)'}[t.status] || 'var(--muted)'}">${t.status}</span>
    </div>`).join('')}
  `;

  renderD3Graph(graph);
}

function renderD3Graph(graph) {
  const container = document.getElementById('graphSvg');
  container.innerHTML = '';
  const width = container.clientWidth || 800;
  const height = container.clientHeight || 500;

  const svg = d3.select(container)
    .attr('viewBox', [0, 0, width, height]);

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrowhead').attr('viewBox', '0 -5 10 10')
    .attr('refX', 22).attr('refY', 0).attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#3a3a5a');

  const nodes = graph.nodes || [];
  const edges = graph.edges || [];

  // Build link references
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const links = edges.filter(e => nodeMap[e.source] && nodeMap[e.target]);

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('y', d3.forceY(height / 2).strength(0.05));

  const link = svg.append('g').selectAll('line')
    .data(links).join('line').attr('class', 'link');

  const node = svg.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', d => `node node-${d.status}`)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r', d => 12 + (d.cost || 0) * 50)
    .attr('fill', d => AGENT_COLORS[d.agent] || '#555')
    .attr('fill-opacity', 0.15);

  node.append('text')
    .attr('dy', -16).attr('text-anchor', 'middle')
    .text(d => d.id);

  node.append('text')
    .attr('class', 'agent-label')
    .attr('dy', 24).attr('text-anchor', 'middle')
    .text(d => d.agent + (d.agent_instance ? ` (${d.agent_instance})` : ''));

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// === AGENT VIEW ===
function openAgentView(agentType) {
  selectedAgentType = agentType;
  switchView('agent');
}

async function loadAgentView(agentType) {
  const res = await fetch(`/api/v2/agents/${agentType}`);
  const data = await res.json();
  const color = AGENT_COLORS[agentType] || '#6c5ce7';

  document.getElementById('agentViewTitle').innerHTML = `<span style="color:${color}">${agentType}</span> Pool`;

  const instances = data.instances || [];
  document.getElementById('agentInstances').innerHTML = instances.map(i => `
    <div class="instance-card">
      <div>
        <div class="instance-id">${i.id}</div>
        ${i.current_task_id ? `<div class="instance-task">${i.current_task_id} (${i.current_demand_id || '?'})</div>` : ''}
        <div style="font-size:10px;color:var(--muted)">${i.total_tasks_completed} tasks completed</div>
      </div>
      <span class="instance-status ${i.status}">${i.status}</span>
    </div>
  `).join('');

  document.getElementById('agentQueue').innerHTML = data.queue_depth > 0
    ? `<div style="font-size:11px;color:var(--muted)">${data.queue_depth} tasks waiting</div>`
    : '<div style="font-size:11px;color:var(--muted)">empty</div>';
}

// === SSE ===
function connectSSE() {
  const es = new EventSource(`/api/events?last_id=${lastEventId}`);
  const dot = document.getElementById('connDot');
  const txt = document.getElementById('connText');

  es.onopen = () => { dot.classList.add('connected'); txt.textContent = 'live'; };
  es.onerror = () => { dot.classList.remove('connected'); txt.textContent = 'reconnecting...'; };

  es.onmessage = (e) => {
    if (e.data.startsWith(':')) return;
    try {
      const ev = JSON.parse(e.data);
      lastEventId = ev.id || lastEventId;
      if (currentView === 'overview') loadOverview();
      if (currentView === 'demand' && selectedDemandId) loadDemandGraph(selectedDemandId);
      if (currentView === 'agent' && selectedAgentType) loadAgentView(selectedAgentType);
    } catch (err) {}
  };
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === Init ===
loadOverview();
connectSSE();
setInterval(() => { if (currentView === 'overview') loadOverview(); }, 10000);
</script>
</body>
</html>
